<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RouterPilot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column}
header{background:#161b22;padding:12px 20px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:12px}
header h1{font-size:18px;font-weight:600;color:#58a6ff}
header span{color:#8b949e;font-size:14px}
#status-dot{width:8px;height:8px;border-radius:50%;background:#3fb950;display:inline-block}
#status-dot.disconnected{background:#f85149}
.container{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:#161b22;border-right:1px solid #30363d;padding:16px;display:flex;flex-direction:column;gap:8px}
.sidebar h3{font-size:12px;text-transform:uppercase;color:#8b949e;letter-spacing:.5px}
.sidebar .cmd{font-size:13px;padding:6px 10px;border-radius:6px;cursor:pointer;color:#c9d1d9;background:#21262d;border:1px solid #30363d}
.sidebar .cmd:hover{background:#30363d;border-color:#58a6ff}
.main{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px}
.input-row{display:flex;gap:8px}
#cmd-input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:14px;font-family:monospace}
#cmd-input:focus{outline:none;border-color:#58a6ff}
#send-btn{padding:10px 20px;border-radius:8px;border:none;background:#238636;color:#fff;font-size:14px;cursor:pointer}
#send-btn:hover{background:#2ea043}
#output{flex:1;overflow-y:auto;background:#161b22;border-radius:8px;border:1px solid #30363d;padding:12px;font-family:monospace;font-size:13px;white-space:pre-wrap;line-height:1.5}
.entry{margin-bottom:8px;padding:8px;border-radius:6px}
.entry.system{color:#8b949e}
.entry.result{color:#7ee787;background:#0d2818}
.entry.error{color:#f85149;background:#290f0f}
.entry .label{font-weight:600;margin-right:8px}
.entry .timestamp{color:#484f58;font-size:11px;margin-right:8px}
</style>
</head>
<body>
<header>
<div id="status-dot"></div>
<h1>RouterPilot</h1>
<span>Web Console</span>
</header>
<div class="container">
<div class="sidebar">
<h3>Quick Commands</h3>
<div class="cmd" onclick="sendCmd('ping 8.8.8.8')">ping 8.8.8.8</div>
<div class="cmd" onclick="sendCmd('system.info')">system.info</div>
<div class="cmd" onclick="sendCmd('system.memory')">system.memory</div>
<div class="cmd" onclick="sendCmd('system.disk')">system.disk</div>
<div class="cmd" onclick="sendCmd('system.uptime')">system.uptime</div>
<div class="cmd" onclick="sendCmd('dns.lookup google.com')">dns.lookup</div>
<div class="cmd" onclick="sendCmd('dhcp.leases')">dhcp.leases</div>
<div class="cmd" onclick="sendCmd('firewall.status')">firewall.status</div>
<div class="cmd" onclick="sendCmd('network.neighbors')">network.neighbors</div>
<div class="cmd" onclick="sendCmd('network.connections')">network.connections</div>
<div class="cmd" onclick="sendCmd('service.list')">service.list</div>
<div class="cmd" onclick="sendCmd('vpn.status')">vpn.status</div>
<div class="cmd" onclick="sendCmd('bridge.status')">bridge.status</div>
<div class="cmd" onclick="sendCmd('diagnose')">diagnose</div>
</div>
<div class="main">
<div class="input-row">
<input type="text" id="cmd-input" placeholder="Type an intent (e.g. ping 8.8.8.8)..." autofocus>
<button id="send-btn" onclick="sendCmd()">Send</button>
</div>
<div id="output"></div>
</div>
</div>
<script>
let ws = null;
const output = document.getElementById('output');
const input = document.getElementById('cmd-input');
const statusDot = document.getElementById('status-dot');

function connect() {
const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const url = protocol + '//' + location.host + '/ws';
ws = new WebSocket(url);

ws.onopen = () => {
statusDot.className = '';
addEntry('Connected', 'system');
};
ws.onclose = () => {
statusDot.className = 'disconnected';
addEntry('Disconnected', 'system');
setTimeout(connect, 3000);
};
ws.onerror = () => {};
ws.onmessage = (e) => {
try {
const msg = JSON.parse(e.data);
if (msg.type === 'status') addEntry(msg.data, 'system');
else if (msg.type === 'error') addEntry('Error: ' + msg.data, 'error');
else if (msg.type === 'result') {
addResult(msg.data);
}
} catch (_) {}
};
}

function sendCmd(text) {
let raw = text || input.value.trim();
if (!raw) return;
input.value = '';

let parts = raw.split(/\s+/);
let intent = parts[0];
let args = {};

if (intent === 'ping' && parts.length > 1) args.target = parts[1];
else if ((intent === 'dns.lookup' || intent === 'network.traceroute') && parts.length > 1) args.target = parts[1];

if (ws && ws.readyState === WebSocket.OPEN) {
ws.send(JSON.stringify({intent, args}));
addEntry('→ ' + raw, 'system');
}
}

function addEntry(text, cls) {
const el = document.createElement('div');
el.className = 'entry ' + (cls || '');
el.innerHTML = '<span class="timestamp">' + new Date().toLocaleTimeString() + '</span>' + escapeHTML(text);
output.appendChild(el);
output.scrollTop = output.scrollHeight;
}

function addResult(data) {
const el = document.createElement('div');
el.className = 'entry result';
let html = '<span class="timestamp">' + new Date().toLocaleTimeString() + '</span>';
if (data.result) {
html += '<span class="label">Result:</span> ' + escapeHTML(JSON.stringify(data.result.output || data.result, null, 2));
} else {
html += escapeHTML(JSON.stringify(data, null, 2));
}
el.innerHTML = html;
output.appendChild(el);
output.scrollTop = output.scrollHeight;
}

function escapeHTML(s) {
if (typeof s !== 'string') s = String(s);
return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCmd(); });
connect();
</script>
</body>
</html>
